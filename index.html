<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Survive The Arena</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <canvas id="gameCanvas"></canvas>

    <!-- The bestiary's field-notes page. A real textarea rather
         than canvas-drawn text so typing, selection, the caret
         and the mobile keyboard all just work; ui.js parks it
         over the notes page it draws and hides it everywhere
         else. -->
    <textarea id="bestiaryNotes"
              maxlength="600"
              spellcheck="false"
              placeholder="Write what you learn about this foe..."></textarea>

    <!-- ===================================== -->
    <!-- Load order rules:                      -->
    <!--                                        -->
    <!-- 1. constants + game.js first (canvas,  -->
    <!--    ctx, Game are read by other files   -->
    <!--    as soon as they load)               -->
    <!--                                        -->
    <!-- 2. Enemy BEFORE any subclass (Grunt,    -->
    <!--    Tank, Spitter, Runner, Boss) -       -->
    <!--    "extends" needs the parent class to  -->
    <!--    already exist                        -->
    <!--                                        -->
    <!-- 3. wave.js needs every enemy class     -->
    <!--    already defined, since ENEMY_CLASSES-->
    <!--    reads them immediately               -->
    <!--                                        -->
    <!-- 4. ui.js needs canvas (button coords)  -->
    <!--                                        -->
    <!-- 5. input.js/main.js go last            -->
    <!-- ===================================== -->

    <!-- Core -->
    <script src="js/core/constants.js"></script>
    <script src="js/core/game.js"></script>
    <script src="js/core/mobile.js"></script>

    <!-- Audio: sounds.js is the catalog (read by save.js for
         its default volumes), audio.js the player. Both go
         before save.js. -->
    <script src="js/audio/sounds.js"></script>
    <script src="js/audio/audio.js"></script>

    <script src="js/save.js"></script>

    <!-- Entities -->
    <script src="js/entities/enemy.js"></script>
    <script src="js/entities/grunt.js"></script>
    <script src="js/entities/tank.js"></script>
    <script src="js/entities/archer.js"></script>
    <script src="js/entities/runner.js"></script>
    <script src="js/entities/boss.js"></script>
    <script src="js/entities/fireMage.js"></script>
    <script src="js/entities/necromancer.js"></script>
    <script src="js/entities/skeleton.js"></script>
    <script src="js/entities/lancer.js"></script>
    <script src="js/entities/shade.js"></script>
    <script src="js/entities/frostWeaver.js"></script>
    <script src="js/entities/powderKeg.js"></script>
    <script src="js/entities/bloodCleric.js"></script>
    <script src="js/entities/king.js"></script>
    <script src="js/entities/royalMagus.js"></script>
    <script src="js/entities/knight.js"></script>
    <script src="js/entities/hazard.js"></script>
    <script src="js/entities/elite.js"></script>
    <script src="js/entities/player.js"></script>
    <script src="js/entities/warrior.js"></script>
    <script src="js/entities/ranger.js"></script>
    <script src="js/entities/thief.js"></script>
    <script src="js/entities/mage.js"></script>
    <script src="js/entities/particle.js"></script>
    <script src="js/entities/damageNumber.js"></script>
    <script src="js/entities/projectile.js"></script>

    <!-- UI -->
    <script src="js/ui/pixelFont.js"></script>
    <script src="js/ui/ui.js"></script>

    <!-- Effects & Waves -->
    <script src="js/arena.js"></script>
    <script src="js/effects.js"></script>
    <script src="js/wave.js"></script>

    <!-- Input (needs canvas, player, ui, game functions) -->
    <script src="js/core/input.js"></script>

    <!-- Main (starts the loop last) -->
    <script src="js/core/main.js"></script>
    

</body>
</html>
